name: Sync requirements exports on Renovate PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  export:
    if: github.actor == 'renovate[bot]' || contains(github.actor, 'renovate')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # Optional but harmless: ensures uv.lock matches pyproject after Renovate changes
      - name: Update lock + exports
        run: |
          uv lock
          uv export --no-hashes --no-dev --no-emit-project --output-file=requirements.txt
          uv export --no-hashes --no-emit-project --output-file=requirements-dev.txt

      - name: Commit updated exports (if any)
        run: |
          if git diff --quiet; then
            echo "No export changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock requirements.txt requirements-dev.txt
          git commit -m "chore: sync uv exports"
          git push
